<html>
    <head>
        <title>Analyze Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>To enter your message:</h1>
        <form action="TextSpectaclesServlet.do" method="POST">

            <table>
                <tr>
                    <td>Name:</td>
                    <td><input type="text" name="name" required></td>
                </tr>

                <tr>
                    <td>Message:</td>
                    <td>
                        <textarea name="message" rows="5" cols="20" required></textarea>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" name="option" value="enter">
                        <input type="submit" name="option" value="summary">
                    </td>
                </tr>
            </table>

        </form>
    </body>
</html>
